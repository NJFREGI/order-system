<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食品工場 注文システム</title>
    <link rel="stylesheet" href="https://unpkg.com/vant@4/lib/index.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vant@4/lib/vant.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f7f8fa; padding-bottom: 100px; }
        .van-submit-bar { bottom: 0; }
    </style>
</head>
<body>
<div id="app">
    <van-nav-bar :title="shopName" right-text="履歴" @click-right="showHistory = true" />
    
    <van-notice-bar v-if="!lastOrderConfirmed" mode="link" text="前回分の受取確認をしてください。" @click="showConfirmPanel = true" />

    <van-card
        v-for="item in products"
        :key="item.id"
        :price="item.price"
        :title="item.name"
        :thumb="item.image_url || 'https://via.placeholder.com/100'"
        :desc="item.spec"
    >
        <template #footer>
            <van-button size="small" type="primary" @click="addToCart(item)">追加</van-button>
        </template>
    </van-card>

    <van-submit-bar :price="totalPrice * 100" button-text="注文確定" @submit="submitOrder" :disabled="!lastOrderConfirmed" />

    <van-popup v-model:show="showConfirmPanel" position="bottom" style="height: 50%; padding: 20px;">
        <h3>受取確認</h3>
        <p>届いた商品を確認してボタンを押してください</p>
        <van-button type="success" block round @click="doConfirmReceipt">受取を完了する</van-button>
    </van-popup>
</div>

<script>
    const { createApp, ref, onMounted, computed } = Vue;
    
    // 连接到你的 Supabase
    const supabaseClient = supabase.createClient(
        'https://bmyaicjjyammbivpnjtg.supabase.co',
        'sb_publishable_K8ton6Wja_WzovUk8wltFQ_vqZHACy3'
    );

    createApp({
        setup() {
            const shopName = ref("新宿第一分店");
            const products = ref([]);
            const cart = ref([]);
            const lastOrderConfirmed = ref(false);
            const showConfirmPanel = ref(false);

            // 加载商品
            const loadData = async () => {
                const { data } = await supabaseClient.from('products').select('*');
                products.value = data || [];
                checkStatus();
            };

            // 检查上一单是否确认
            const checkStatus = async () => {
                const { data } = await supabaseClient.from('orders')
                    .select('status')
                    .eq('shop_name', shopName.value)
                    .order('created_at', { ascending: false }).limit(1);
                if (!data || data.length === 0 || data[0].status === 'completed') {
                    lastOrderConfirmed.value = true;
                }
            };

            const addToCart = (item) => {
                cart.value.push(item);
                vant.showToast('追加しました');
            };

            const totalPrice = computed(() => cart.value.reduce((s, i) => s + i.price, 0));

            const submitOrder = async () => {
                const { error } = await supabaseClient.from('orders').insert([{
                    shop_name: shopName.value,
                    items: cart.value,
                    total_amount: totalPrice.value,
                    status: 'pending'
                }]);
                if (!error) {
                    vant.showToast('注文完了！');
                    cart.value = [];
                    lastOrderConfirmed.value = false; // 下单后需等待收货
                }
            };

            const doConfirmReceipt = async () => {
                // 这里逻辑简化：将最后一单改为已完成
                lastOrderConfirmed.value = true;
                showConfirmPanel.value = false;
                vant.showToast('確認しました');
            };

            onMounted(loadData);

            return { shopName, products, addToCart, totalPrice, submitOrder, lastOrderConfirmed, showConfirmPanel, doConfirmReceipt };
        }
    }).use(vant).mount('#app');
</script>
</body>
</html>
