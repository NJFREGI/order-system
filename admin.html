<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>工場管理后台</title>
    <link rel="stylesheet" href="https://unpkg.com/vant@4/lib/index.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vant@4/lib/vant.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f0f2f5; padding: 10px; }
        .order-card { background: white; margin-bottom: 15px; border-radius: 8px; padding: 15px; border-left: 5px solid #1989fa; }
        .item-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #eee; }
        .shortage { color: red; text-decoration: line-through; }
    </style>
</head>
<body>
<div id="app">
    <van-sticky>
        <van-nav-bar title="工場受注一覧" right-text="更新" @click-right="loadOrders" />
    </van-sticky>

    <div v-for="order in orders" :key="order.id" class="order-card">
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
            <strong>店名: {{ order.shop_name }}</strong>
            <van-tag :type="getStatusType(order.status)">{{ order.status }}</van-tag>
        </div>

        <div v-for="(item, index) in order.items" :key="index" class="item-row">
            <span :class="{ 'shortage': item.isMissing }">{{ item.name }} x {{ item.qty }}</span>
            <van-button size="mini" plain type="danger" @click="handleShortage(order, index)">欠品</van-button>
        </div>

        <div style="margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px;">
            <van-button size="small" icon="edit" @click="editOrder(order)">修改</van-button>
            <van-button size="small" type="primary" @click="completeOrder(order)">确认发货</van-button>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;
    
    // --- 请替换你的密钥 ---
    const SUPABASE_URL = 'https://xxxx.supabase.co';
    const SUPABASE_KEY = 'eyJhbG...';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    createApp({
        setup() {
            const orders = ref([]);

            const loadOrders = async () => {
                const { data } = await supabase
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });
                orders.value = data || [];
            };

            // 处理欠品逻辑：修改订单中的 items JSON，并写回数据库
            const handleShortage = async (order, itemIndex) => {
                const updatedItems = [...order.items];
                updatedItems[itemIndex].isMissing = true;
                updatedItems[itemIndex].qty = 0; // 欠品则数量归零

                const { error } = await supabase
                    .from('orders')
                    .update({ items: updatedItems, status: '欠品调整中' })
                    .eq('id', order.id);

                if (!error) {
                    vant.showToast('欠品情報を更新しました');
                    loadOrders(); // 重新加载
                }
            };

            const getStatusType = (s) => {
                if (s === 'pending') return 'warning';
                if (s === 'completed') return 'success';
                return 'primary';
            };

            onMounted(loadOrders);

            return { orders, loadOrders, handleShortage, getStatusType };
        }
    }).use(vant).mount('#app');
</script>
</body>
</html>
